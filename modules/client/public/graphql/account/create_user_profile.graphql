mutation create_user_profile(
  $id: ID!
  $token: String!
) {
  user_update(
    id: $id
    user: {
      profiles: [
        {
          name: "modules/client/client",
          values: {
            properties: [
              { name: "verification_token", value: $token }
            ]
          }
        }
      ]
    }
  ) {
    id
  }
}