mutation set_email_verification_token(
  $id: ID!
  $token: String!
) {
  user_update(
    id: $id
    user: {
      profiles: [
        {
          name: "modules/client/client",
          values: {
            properties: [
              { name: "verification_token", value: $token }
            ]
          }
        }
      ]
    }
    form_name: "modules/client/set_email_verification_token"
  ) {
    id
  }
}