query get_user_with_password_token($email: String, $id: ID) {
  users(
    per_page:1
    filter: {
      email: {
        value: $email
      }
      id: {
        value: $id
      }
    }
  ) {
    results{
      id
      email
      first_name
      default: profiles(profile_type: "modules/insites_core/insites_default") {
        password_token: property(name: "password_token")
      }
      customer: profiles(profile_type: "modules/ecommerce/customer") {
        verification_token: property(name: "verification_token")
      }
    }
  }
}