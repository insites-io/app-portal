mutation add_company (
  $company_name: String!,
  $company_email: String,
  $company_phone_country_code: String,
  $company_phone_number: String,
  $rbn: String
) {
  item: record_create(
    record: {
      table: "modules/insites_core/insites_company"
      properties: [
        { name: "company_name", value: $company_name }
        { name: "is_archived", value_boolean: false }
        { name: "email_1", value: $company_email }
        { name: "work_phone_country_code", value: $company_phone_country_code }
        { name: "work_phone_number", value: $company_phone_number }
        { name: "rbn", value: $rbn }
      ]
    }
  ) {
    id
    created_at
    properties
  }
}
