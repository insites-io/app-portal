mutation test_create_address (
    $source_id: String!,
    $source_name: String!,
    $name: String!,
    $address_1: String,
    $address_2: String,
    $address_3: String,
    $city: String,
    $county: String,
    $district: String,
    $suburb: String,
    $state: String,
    $country: String,
    $country_code: String,
    $postcode: String,
    # $is_enabled: Boolean = true,
    $default_address: Boolean = true
) {
    item: record_create(
        record: {
        table: "modules/insites_core/crm_address",
        properties: [
                { name: "uuid", value: $source_id }
                { name: "related_uuid", value: $source_name }
                { name: "related_type", value: "contact" }
                { name: "name", value: $name }
                { name: "address_1", value: $address_1 }
                { name: "address_2", value: $address_2 }
                { name: "address_3", value: $address_3 }
                { name: "city", value: $city }
                { name: "county", value: $county }
                { name: "district", value: $district }
                { name: "suburb", value: $suburb }
                { name: "state", value: $state }
                { name: "country", value: $country }
                { name: "country_code", value: $country_code }
                { name: "postcode", value: $postcode }
                { name: "is_archived", value_boolean: false }
                { name: "default_address", value_boolean: $default_address }
            ]
        }
    ) {
        id
        created_at
        properties
    }
}