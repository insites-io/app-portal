mutation set_company_uuid(
  $id: ID!
  $company_uuid: String!
) {
  user_update(
    id: $id
    user: {
      profiles: [
        {
          name: "modules/client/client",
          values: {
            properties: [
              { name: "company_uuid", value: $company_uuid }
            ]
          }
        }
      ]
    }
    form_name: "modules/client/set_company_uuid"
  ) {
    id
  }
}