mutation update_user_custom_field($id: ID!,$permission_level: String, $primary_account_holder: Boolean ) {
  items: record_update(
    id: $id
    record: 
    	{table: "modules/ins_core/crm_contact_custom_field", 
        properties: [
            {name: "permission_level", value: $permission_level}
            {name: "primary_account_holder", value_boolean: $primary_account_holder}
        ]}
  ) {
    id
  }
}
