mutation update_discount_usage_limit (
  $id: ID!,
  $usage_count: Int
) {
  items: record_update (
    id: $id
    record: {
      table: "modules/insites_ecommerce/discount",
      properties: [
        { name: "usage_count", value_int: $usage_count }
      ]
    }
  ) {
    id
    created_at
    updated_at
    properties
  }
}