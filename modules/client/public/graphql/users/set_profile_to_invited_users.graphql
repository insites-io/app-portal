mutation set_profile_to_invited_users(
  $id: ID!
  $token: String!
  $company_uuid: String
) {
  user_update(
    id: $id
    user: {
      profiles: [
        {
          name: "modules/client/client",
          values: {
            properties: [
              { name: "is_enabled", value_boolean: true}
              { name: "is_activated", value_boolean: true}
              { name: "company_uuid", value: $company_uuid }
              { name: "verification_token", value: $token }
            ]
          }
        }
      ]
    }
    form_name: "modules/client/set_profile_details_to_invited_users"
  ) {
    id
  }
}