query get_user_by_email (
  $page: Int = 1, 
  $size: Int = 10, 
  $email: String!
) {
  items: users(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      email: { value: $email }
    }
    sort: {
      updated_at: { order: DESC }
    }
  ) {
    total_entries
    total_pages
    results {
      id
      created_at
      updated_at
      email
      first_name
      last_name
      
      ## INS ECO Customer
      customer: profiles(
        profile_type: "modules/client/client"
      ) {
        is_enabled: property_boolean(name: "is_enabled")
        is_activated: property_boolean(name: "is_activated")
      }

      ## INS Contact Number
      # contact: profiles(
      #   profile_type: "modules/insites_core/insites_contact_number"
      # ) {
      #   id
      #   properties
      # }
    }
  }
}