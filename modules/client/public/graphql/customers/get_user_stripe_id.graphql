query get_user_stripe_id($email:String, $id:ID){
  items: users(
    page: 1,
    per_page: 1,
    filter: {
      deleted_at: { exists:false }
      email: { contains: $email }
      id: { value: $id }
      
    }
    sort:{
      updated_at:{order:DESC}
    }
  ){
    total_entries
    results{
      id
      email
      first_name
      last_name
      external_id      
      deleted_at
      created_at
      profiles{
        id
        # profile_type
        # properties
        stripe_id:property(name:"stripe_id")
      }
    }
  }
} 