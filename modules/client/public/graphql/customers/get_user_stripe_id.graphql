query get_user_stripe_id($email:String, $id:ID){
  items: users(
    page: 1,
    per_page: 1,
    filter: {
      deleted_at: { exists:false }
      email: { contains: $email }
      id: { value: $id }
      
    }
    sort:{
      updated_at:{order:DESC}
    }
  ){
    total_entries
    results{
      id
      email
      first_name
      last_name
      external_id      
      deleted_at
      created_at
      profiles(profile_type: "modules/insites_core/crm_contact"){
        id
        stripe_id: property(name: "stripe_id")
        company_uuid: property(name: "company_uuid")
        #properties
      }
    }
  }
} 