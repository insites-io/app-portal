mutation create_customer_model(
  $gateway_id: String!
  $gateway_name: String!
  $user_id: String!
  $external_id: String
  $email: String!
  $name: String
  $default_source: String
) {
  items: record_create(
    record: {
      table: "modules/insites_ecommerce/insites_customer"
      properties: [
        { name: "gateway_id", value: $gateway_id }
        { name: "gateway_name", value: $gateway_name }
        { name: "user_id", value: $user_id }
        { name: "external_id", value: $external_id }
        { name: "email", value: $email }
        { name: "name", value: $name }
        { name: "default_source", value: $default_source }
      ]
    }
  ) {
    id
    created_at
    properties
  }
}