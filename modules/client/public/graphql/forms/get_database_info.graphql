query get_database_info(
  $resource: String
){
  items: admin_model_schemas(
    page:1,
    per_page: 100
    filter:{
      name:{ value: $resource }
    }
  ){
    total_entries
    results{
      id
      name
      metadata
      properties{
        id
        name
        target_type
        attribute_type
        metadata
      }
    }
  }
}