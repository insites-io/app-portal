query get_credit_card (
  $id: ID,
  $page: Int = 1,
  $size: Int = 10,
	$contact_uuid: String
  $user_id: String
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/payment_method" }
      properties: [
        { name: "user_id", value: $user_id }
        { name: "contact_uuid", value: $contact_uuid }
      ] 
    }
    sort: { updated_at: { order: DESC } }
  ) {
    total_entries
    total_pages
    current_page
    results {
      id
      properties       
    }
  }
}