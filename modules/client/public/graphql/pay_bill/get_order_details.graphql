query get_order_details (
  $id: ID
  $user_id: String
  $is_more: Boolean=false
  ){
  items: records(
    per_page: 1
    filter: {
      id: { value: $id }
      deleted_at:{ exists:false }
      table: { value: "modules/insites_ecommerce/insites_order" }
      properties:[
        { name: "user_id", value: $user_id }
      ]
    }
  ){
    results {
			
      id
      user_id: property(name: "user_id")
      
      tax_amount: property_float(name: "tax_amount")   
      total_amount: property_float(name: "total_amount")  
                       
      payment: related_record(
        table: "modules/insites_ecommerce/insites_payment"
        join_on_property: "id"
        foreign_property: "order_id"
        sort: { updated_at: { order: DESC }}
      ) {
        card_brand: property(name: "card_brand")
        card_last4: property(name: "card_last4")
        card_exp_month: property(name: "card_exp_month")
        card_exp_year: property(name: "card_exp_year")        
      }
     
    },
    results @include(if: $is_more){
      
      order_status: property(name: "order_status")             
      
      cart: related_records(
        table: "modules/insites_ecommerce/insites_cart"
        foreign_property: "order_id", 
        join_on_property: "id") {
          product_name: property(name: "product_name")  
          product_variant: property(name: "product_variant") 
          quantity: property_int(name: "quantity") 
          product_price: property_float(name: "product_price")                
      }

    }
  }
}