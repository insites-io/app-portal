query get_client_model (
    $id: ID,
    $page: Int = 1,
    $size: Int = 10,
    $gateway_id: String,
    $gateway_name: String,
    $user_id: String
    $email: String,
  ) {
    items: records(
      page: $page
      per_page: $size
      filter: {
        id: { value: $id }
        deleted_at: { exists: false }
        table: { value: "modules/client/client" }
        properties: [
          { name: "gateway_id", value: $gateway_id }
          { name: "gateway_name", value: $gateway_name }
          { name: "user_id", value: $user_id }
          { name: "email", value: $email }
        ] 
      }
      sort: { updated_at: { order: DESC } }
    ) {
      total_entries
      total_pages
      current_page
      results {
        id 
        gateway_id: property(name: "gateway_id") 
      }
    }
  }