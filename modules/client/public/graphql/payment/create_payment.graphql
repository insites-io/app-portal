mutation create_payment(
    $order_id: String!
    $payment_source: String
    $payment_status: String
    $notes: String
    $date_time: String!
    $last_updated_by_id: String
    $is_enabled: Boolean = true

    $payment_gateway_details: String
    $payment_gateway_name: String

    $card_last4: String
    $card_brand: String
    $card_exp_month: String
    $card_exp_year: String

    $currency: String!
    $order_value: Float!
    $amount: Float!
    $amount_due: Float!

) {
    items: record_create(
        record: {
            table: "modules/insites_ecommerce/insites_payment",
            properties: [
                { name: "order_id", value: $order_id }
                { name: "payment_source", value: $payment_source }
                { name: "payment_status", value: $payment_status }
                { name: "notes", value: $notes }
                { name: "date_time", value: $date_time }
                { name: "last_updated_by_id", value: $last_updated_by_id }
                { name: "is_enabled", value_boolean: $is_enabled }

                { name: "payment_gateway_details", value: $payment_gateway_details }
                { name: "payment_gateway_name", value: $payment_gateway_name }

                { name: "card_last4", value: $card_last4 }
                { name: "card_brand", value: $card_brand }
                { name: "card_exp_month", value: $card_exp_month }
                { name: "card_exp_year", value: $card_exp_year }

                { name: "currency", value: $currency }
                { name: "order_value", value_float: $order_value }
                { name: "amount", value_float: $amount }
                { name: "amount_due", value_float: $amount_due }
            ]
        }
    ) {
        id
        properties
    }
}