query get_banner(
    $page: Int = 1, 
    $size: Int = 10,
    $keyword: String
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/client/client_portal_banners" }
            deleted_at: { exists: false }
            properties: [
                { name: "enabled", value_boolean: true }
                { name: "main_text", contains: $keyword }
            ]
        }
        sort: [
            { properties: { name: "sort_order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
            #properties
            main_text: property(name: "main_text")
            sub_text: property(name: "sub_text")
            button_link: property(name: "button_link")
            button_label: property(name: "button_label")  

            ## Images
            desktop_image: property_upload(name: "desktop_image") {
                url
                file_name
                extension
                versions
            }
            mobile_image: property_upload(name: "mobile_image") {
                url
                file_name
                extension
                versions
            }
        }
    }
}