query get_subcategories (
  $page: Int = 1,
  $size: Int = 20,
  $parent_category_uuids: [String!]
  $sort_by: [RecordsSortInput!] = {
      properties: [
          { name: "category_name", order: ASC }
      ]
  }
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/category" }
      properties: [
        { name: "status", value: "enabled" }
        { name: "parent_category_uuids", array_overlaps: $parent_category_uuids }
      ] 
    }
    sort: $sort_by
  ) {
    total_entries
    total_pages
    current_page
    results {
      id             
      #properties
			uuid: property(name: "uuid")
      slug: property(name: "slug")
      category_name: property(name: "category_name")
      parent_category_uuids: property_array(name: "parent_category_uuids")      
    }
  }
}