query get_completed_orders (
  $page: Int = 1,
  $size: Int = 1,
  $order_contact_uuid: String
) {
  items: records (
    per_page: $size,
    page: $page,
    filter: {
      table: {
        value: "modules/insites_ecommerce/order"
      },
      properties: [
        { name: "order_contact_uuid", value: $order_contact_uuid }
        { name: "order_status", contains: "Completed" } #use contains for case insensitive
      ]
    }
  ) {          
    total_entries
     orders: results {      
      date_time: property(name: "date_time")
      cart: related_record(
        table: "modules/insites_ecommerce/cart"
        join_on_property: "uuid"
        foreign_property: "order_uuid"
      ){
        #Use the product details instead of the cart details.
        product: related_record(
          table: "modules/insites_ecommerce/product"
          join_on_property: "product_uuid"
        	foreign_property: "uuid"
        ) {
          #properties
          slug: property(name: "slug")
          product_name: property(name: "product_name")
          category_uuids: property_array(name: "category_uuids")
          regular_price: property(name: "regular_price")
          is_featured: property_boolean(name: "is_featured")
          product_image: property_upload(name: "product_image") {
            url
          }
        }        
      }
     }
  }
}