query get_parent_menu {
  items: records(
    page: 1
    per_page: 99
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/website/menu" }
      properties: [
        { name: "show_in_menu", value_boolean: true },
        { name: "parent", exists: false }
      ]
    },
    sort: {
      properties: [
        { name: "order", order: ASC }
      ]
    }
    
  ) {
    total_entries
    results {
      id
      slug: property(name: "slug")
      label: property(name: "label")
    }
  }
}