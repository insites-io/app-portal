query get_child_menu ($parent_id: String) {
  items: models(
    page: 1
    per_page: 1000
    filter: {
      deleted_at: { exists: false }
      model_schema_name: { value: "modules/website/menu" }
      properties: [
        { name: "show_in_menu", value_boolean: true },
        { name: "parent", value: $parent_id }

      ]
    },
    sort: {
      properties: [
        { name: "order", order: ASC }
      ]
    }
    
  ) {
    total_entries
    results {
      id
      slug: property(name: "slug")
      label: property(name: "label")
      parent: property(name: "parent")
    }
  }
}