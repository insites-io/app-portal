query check_models_last_updated ($models: [String!]) {
  items: records(
    per_page: 1
    filter: {
      ## These are the dynamic content on the page
      ## Add/remove model names as needed base on your page content
      table: { 
        value_in: $models
      } 
    }
    sort: { updated_at: { order: DESC } }
  ) {
    total_entries
    total_pages
    results {
      updated_at
      id
      model: table
    }
  }
}