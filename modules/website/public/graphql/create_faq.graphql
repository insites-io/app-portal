mutation create_faq(
  $question: String,
  $answer: String
) {
  items: model_create(
    model: {
      model_schema_name: "modules/ins_databases/test_faq",
      properties: [
        { 
          name: "question",
          value: $question
        }
        { 
          name: "answer",
          value: $answer
        }
      ]
    }
  ) {
      id
    }
}