query get_google_api (
  $sort: RecordsSortInput = { updated_at: { order: DESC }}
) {
	items: records(
		per_page: 1
		page: 1
		filter:{
			deleted_at: { exists: false }
			table: { value: "modules/insites_core/constant" }
			properties: [
				{ name: "constant_name", value: "google_maps_api_key" }
			]
		}
		sort: [$sort]
	) {
		total_entries
		total_pages
		has_next_page
		has_previous_page
		results { 
			id
			created_at
			updated_at
			uuid: property(name: "uuid")              
			constant_name: property(name: "constant_name")
			value: property(name: "value")
		}
	}
}