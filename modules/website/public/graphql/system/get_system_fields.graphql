query get_system_fields ($key: String, $page: Int = 1, $size: Int = 10) {
    items: records(
        per_page: $size
        page: $page
        filter:{
            deleted_at: { exists: false }
            table: { value: "modules/insites_core/insites_system_fields" }
            properties: [
                { name: "key", value: $key },
                { name: "is_enabled", value_boolean: true }
            ]
    }
    sort: { updated_at: { order: DESC } }
    ) {
        total_entries
        total_pages
        has_next_page
        has_previous_page
        results { 
            id
            key: property(name: "key")              
            value: property(name: "value")
            is_enabled: property_boolean(name: "is_enabled")
            created_at
            updated_at
        }
    }
}
