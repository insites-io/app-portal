query get_contact_us (
  $sort: RecordsSortInput = { updated_at: { order: DESC }}
) {
	items: records(
		per_page: 1
		page: 1
		filter:{
			table: { value: "modules/insites_cms/insites_global_content" }
			}
		sort: [$sort]
	) {
		total_entries
		total_pages
		has_next_page
		has_previous_page
		results { 
			id
			created_at
			updated_at
      loc_1_name: property(name: "loc_1_name")
			loc_1_address: property(name: "loc_1_address")  
      loc_1_phone_country_code: property(name: "loc_1_phone_country_code")
			loc_1_phone_number:property(name: "loc_1_phone_number")
      loc_1_email:property(name: "loc_1_email")
      twitter_link:property(name: "twitter_link")
      youtube_link:property(name: "youtube_link")
      facebook_link:property(name: "facebook_link")
      linkedin_link:property(name: "linkedin_link")
      
			loc_1_mon_enable: property(name: "loc_1_mon_enable")
      loc_1_mon_open: property(name: "loc_1_mon_open")
      loc_1_mon_close: property(name: "loc_1_mon_close")
      
      loc_1_tue_enable: property(name: "loc_1_tue_enable")
      loc_1_tue_open: property(name: "loc_1_tue_open")
      loc_1_tue_close: property(name: "loc_1_tue_close")
      
      loc_1_wed_enable: property(name: "loc_1_wed_enable")
      loc_1_wed_open: property(name: "loc_1_wed_open")
      loc_1_wed_close: property(name: "loc_1_wed_close")
      
      loc_1_thu_enable: property(name: "loc_1_thu_enable")
      loc_1_thu_open: property(name: "loc_1_thu_open")
      loc_1_thu_close: property(name: "loc_1_thu_close")
            
      loc_1_fri_enable: property(name: "loc_1_fri_enable")
      loc_1_fri_open: property(name: "loc_1_fri_open")
      loc_1_fri_close: property(name: "loc_1_fri_close")
      
      loc_1_sat_enable: property(name: "loc_1_sat_enable")
      loc_1_sat_open: property(name: "loc_1_sat_open")
      loc_1_sat_close: property(name: "loc_1_sat_close")
      
      loc_1_sun_enable: property(name: "loc_1_sun_enable")
      loc_1_sun_open: property(name: "loc_1_sun_open")
      loc_1_sun_close: property(name: "loc_1_sun_close")
      
      
		}
	}
}