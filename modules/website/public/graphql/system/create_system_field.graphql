mutation create_system_field ($key: String, $value: String) {
  items: record_create(
    record: {
      	table: "modules/insites_core/insites_system_fields"
      	properties: [
          	{ name:"key", value: $key }
          	{ name:"value", value: $value }
          	{ name:"is_enabled", value_boolean: true }
        ] 
    } 
  ){
    id    
  }
}