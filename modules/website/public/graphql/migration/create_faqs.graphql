mutation create_faqs(
  $question: String,
  $slug: String,
  $answer: String,
  $sort_order: String,
  $sub_topic_title_1: String,
  $sub_topic_details_1: String,
  $sub_topic_title_2: String,
  $sub_topic_details_2: String,
  $sub_topic_title_3: String,
  $sub_topic_details_3: String,
  $sub_topic_title_4: String,
  $sub_topic_details_4: String
) {
  items: record_create(
    record: {
      table: "modules/website/faqs",
      properties: [
        { 
          name: "question",
          value: $question 
        },
        { 
          name: "slug",
          value: $slug 
        },
        { 
          name: "answer",
          value: $answer 
        },
        { 
          name: "sort_order",
          value: $sort_order
        },
        { 
          name: "sub_topic_title_1",
          value: $sub_topic_title_1
        },
        { 
          name: "sub_topic_details_1",
          value: $sub_topic_details_1
        },
        { 
          name: "sub_topic_title_2",
          value: $sub_topic_title_2
        },
        { 
          name: "sub_topic_details_2",
          value: $sub_topic_details_2
        },
        { 
          name: "sub_topic_title_3",
          value: $sub_topic_title_3
        },
        { 
          name: "sub_topic_details_3",
          value: $sub_topic_details_3
        },
        { 
          name: "sub_topic_title_4",
          value: $sub_topic_title_4
        },
        { 
          name: "sub_topic_details_4",
          value: $sub_topic_details_4
        }
      ]
    }
  ) {
    id
    properties
  }
}