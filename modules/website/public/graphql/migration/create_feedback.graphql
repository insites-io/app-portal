mutation create_feedback(
  $full_name: String,
  $location: String,
  $message: String
 
) {
  items: record_create(
    record: {
      table: "modules/website/feedback",
      properties: [
        { 
          name: "full_name",
          value: $full_name 
        },
        { 
          name: "location",
          value: $location 
        },
        { 
          name: "message",
          value: $message 
        },
        {
          name: "allow_display_on_website",
          value: "Yes"
        },
        {
          name: "is_shown_on_webstie",
          value_boolean: true
        }
      ]
    }
  ) {
    id
    properties
  }
}