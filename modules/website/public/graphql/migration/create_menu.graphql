mutation create_menu(
  $label: String,
  $order: String,
  $slug: String,
  $parent: String
 
) {
  items: record_create(
    record: {
      table: "modules/website/menu",
      properties: [
        { 
          name: "label",
          value: $label 
        },
        { 
          name: "order",
          value: $order 
        },
        { 
          name: "slug",
          value: $slug 
        },
        { 
          name: "show_in_menu",
          value_boolean: true
        },
        { 
          name: "parent",
          value:  $parent
        }
      ]
    }
  ) {
    id
    properties
  }
}