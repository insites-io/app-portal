mutation create_attachment_file($uuid: String!, $file: String) {
  item: record_create(
    record: {
      table: "modules/insites_core/attachment",
      properties: [
        { name: "uuid", value: $uuid },
        { name: "file", value: $file },
        { name: "module_source", value: "Insites Databases" },
        { name: "module_feature", value: "database_items" }
      ]
    }
  ) {
    id
    uuid: property(name: "uuid")
    file: property_upload(name: "file") {
      file_name
      extension
      url
    }
    properties
  }
}
