query get_features (
    $page: Int = 1, 
    $size: Int = 10,
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/website/features" }
            deleted_at: { exists: false }
            properties: [
                { name: "enabled", value_boolean: true }
                { name: "is_parent", value_boolean: true }
            ]
        }
        sort: [
            { properties: { name: "card_order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
            deleted_at
            slug: property(name: "slug")
            card_title: property(name: "card_title")
            card_short_description: property(name: "card_short_description")
            icon: property_upload(name: "icon") {
                url
                file_name
                extension
                versions
            }
        }
    }
}