query get_faqs(
    $page: Int = 1, 
    $size: Int = 9,
    $keyword: String
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/website/faqs" }
            deleted_at: { exists: false }
            properties: [
                { name: "name", contains: $keyword }
            ]
        }
        sort: [
            { properties: { name: "order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
          category:property(name: "category")
          question:property(name: "question")
          answer:property(name: "answer")
          slug:property(name: "slug")
          sub_topic_1_title:property(name: "sub_topic_1_title")
          sub_topic_1_details:property(name: "sub_topic_1_details")
          sub_topic_2_title:property(name: "sub_topic_2_title")
          sub_topic_2_details:property(name: "sub_topic_2_details")
          sub_topic_3_title:property(name: "sub_topic_3_title")
          sub_topic_3_details:property(name: "sub_topic_3_details")
          sub_topic_4_title:property(name: "sub_topic_4_title")
          sub_topic_4_details:property(name: "sub_topic_4_details")
          
          
        }
    }
}