query get_news(
    $page: Int = 1, 
    $size: Int = 9,
    $keyword: String
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/ins_databases/news" }
            deleted_at: { exists: false }
            properties: [
                { name: "name", contains: $keyword }
            ]
        }
        sort: [
            { properties: { name: "order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
          title:property(name: "title")
          slug: property(name: "slug")
          author:property(name: "author")
		    published_date:property(name: "published_date")
          content:property(name: "content")
          list_view_text:property(name: "list_view_text")

          ## list_view_image
          list_view_image: property_upload(name: "list_view_image") {
              url
              file_name
              extension
              versions
          }     
          
          ## main_image
          main_image: property_upload(name: "main_image") {
              url
              file_name
              extension
              versions
          }
        }
    }
}