query get_page_header (
    $page: Int = 1, 
    $size: Int = 10,
    $slug: String
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/website/page_header" }
            deleted_at: { exists: false }
            properties: [
                { name: "enabled", value_boolean: true }
                { name: "slug", value: $slug }
            ]
        }
        sort: [
            { updated_at: { order: DESC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
            # properties
            header_text: property(name: "header_text")
            short_text: property(name: "short_text")
            enabled: property_boolean(name: "enabled")

            ## Images
            image: property_upload(name: "image") {
                url
                file_name
                extension
                versions
            }
        }
    }
}