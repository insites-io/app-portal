query get_services_homapage(
    $page: Int = 1, 
    $size: Int = 9,
    $keyword: String
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/website/services_database" }
            deleted_at: { exists: false }
            properties: [
                { name: "name", contains: $keyword }
                { name: "is_enabled", value_boolean: true }
                { name: "add_to_homepage", value: "Yes" }
            ]
        }
        sort: [
            { properties: { name: "order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
            # Details
            slug: property(name: "slug")
          	service_name: property(name: "service_name")
            list_view_text: property(name: "list_view_text")
            list_view_icon:property(name: "list_view_icon")
        }
    }
}