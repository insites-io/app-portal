query get_sub_menu(
  $page: Int = 1,
  $size: Int = 20,
  $parent_menu: String
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/website/main_menu" }
      properties: [
        { name: "enabled", value_boolean: true }
        { name: "parent_menu", contains: $parent_menu }
      ] 
    }
    sort:[
      { properties: { name: "order", order: ASC } }
    ]
  ) {
    total_entries
    total_pages
    current_page
    results {
      id 
      created_at
      updated_at
      label: property(name: "label")
      link: property(name: "link")
      parent_menu: property(name:"parent_menu")
    }
  }
}