query get_homepage_slider(
    $page: Int = 1, 
    $size: Int = 10,
    $keyword: String
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/website/homepage_slider" }
            deleted_at: { exists: false }
            properties: [
                { name: "enabled", value_boolean: true }
                { name: "title", contains: $keyword }
            ]
        }
        sort: [
            { properties: { name: "order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
            # properties
            title: property(name: "title")
            short_text: property(name: "short_text")
            long_text: property(name: "long_text")
            link: property(name: "link")

            enabled: property_boolean(name: "enabled")
            start_date: property(name: "start_date")
            end_date: property(name: "end_date")

            ## Images
            image: property_upload(name: "image") {
                url
                file_name
                extension
                versions
            }
        }
    }
}