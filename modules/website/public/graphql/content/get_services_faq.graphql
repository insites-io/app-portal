
query get_services_faq ($page: Int = 1, $size: Int = 10) {
  items: records(
    page: $page,
    per_page: $size, 
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/website/services_faq" }, 
      properties: { name: "enabled", value_boolean: true }
    }, 
    sort: [
      { properties: { name: "order", order: ASC } }
    ]
  ) {
      total_entries
      total_pages
      current_page
      has_next_page
      has_previous_page
      results {
        title: property(name: "title")
        content: property(name: "content")
        enabled: property_boolean(name: "enabled")
      }
    }
}