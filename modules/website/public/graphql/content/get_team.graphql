query get_team(
    $page: Int = 1, 
    $size: Int = 10,
    $keyword: String
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/website/team" }
            deleted_at: { exists: false }
            properties: [
                { name: "enabled", value_boolean: true }
                { name: "name", contains: $keyword }
            ]
        }
        sort: [
            { properties: { name: "order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
            properties
            ### Images
            image: property_upload(name: "image") {
                url
                file_name
                extension
                versions
            }
        }
    }
}