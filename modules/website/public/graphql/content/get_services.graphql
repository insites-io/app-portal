query get_services(
    $page: Int = 1, 
    $size: Int = 9,
    $keyword: String
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/website/services" }
            deleted_at: { exists: false }
            properties: [
                { name: "name", contains: $keyword }
                { name: "enabled", value_boolean: true }
            ]
        }
        sort: [
            { properties: { name: "order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
            # properties

            enabled: property_boolean(name: "enabled")
            start_date: property(name: "start_date")
            end_date: property(name: "end_date")

            name: property(name: "name")
            slug: property(name: "slug")
            description: property(name: "description")
            link: property(name: "link")

            # Images
            image: property_upload(name: "image") {
                url
                file_name
                extension
                versions
            }
        }
    }
}