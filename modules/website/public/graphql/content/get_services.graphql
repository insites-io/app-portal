query get_services(
    $page: Int = 1, 
    $size: Int = 9,
    $keyword: String
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/ins_databases/services_database" }
            deleted_at: { exists: false }
            properties: [
                { name: "name", contains: $keyword }
                { name: "enabled", value_boolean: true }
            ]
        }
        sort: [
            { properties: { name: "order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
            # Details
            slug: property(name: "slug")
          	service_name: property(name: "service_name")
						list_view_text: property(name: "list_view_text")
						list_view_image: property_upload(name: "list_view_image") {
                url
                file_name
                extension
                versions
            }
          	#Headings
          	sub_heading_1:property(name: "sub_heading_1")
          	content_block_1:property(name: "content_block_1")
						image_1: property_upload(name: "image_1") {
                url
                file_name
                extension
                versions
            }
          	sub_heading_2:property(name: "sub_heading_2")
          	content_block_2:property(name: "content_block_2")
						image_2: property_upload(name: "image_2") {
                url
                file_name
                extension
                versions
            }
            sub_heading_3:property(name: "sub_heading_3")
          	content_block_3:property(name: "content_block_3")
						image_3: property_upload(name: "image_3") {
                url
                file_name
                extension
                versions
            }
        }
    }
}