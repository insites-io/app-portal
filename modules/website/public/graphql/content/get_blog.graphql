query get_blog(
  $page: Int = 1, 
  $size: Int = 10,
  $keyword: String,
  $timeNow: String
) {
  items: records(
    page: $page,
    per_page: $size, 
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/website/blog" }, 
      properties:[ 
        { name: "status", value: "Published" },
        { name: "published_date", range: {lt: $timeNow}}
      ]
      or: {
        properties: { name: "post_title", contains: $keyword }
      }
    }, 
    sort: [
      { properties: { name: "published_date", order: DESC } }
      { properties: { name: "order", order: ASC } }
    ]
  ) {
      total_entries
      total_pages
      current_page
      has_next_page
      has_previous_page
      results {
        post_title: property(name: "post_title")
        short_text: property(name: "short_text")
        description: property(name: "description")
        slug: property(name: "slug")
        category: property(name: "category")
        author: property(name: "author")
        published_date: property(name: "published_date")
        image: property_upload(name: "image") {
          url
          file_name
          extension
          versions
        }
      }
    }
}