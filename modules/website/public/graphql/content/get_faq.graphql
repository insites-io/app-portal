query get_services(
    $page: Int = 1, 
    $size: Int = 9,
    $keyword: String
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/website/faq" }
            deleted_at: { exists: false }
            properties: [
                { name: "name", contains: $keyword }
            ]
        }
        sort: [
            { properties: { name: "order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
          category:property(name: "category")
          question:property(name: "question")
          answer:property(name: "answer")
        }
    }
}