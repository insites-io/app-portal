query get_author(
    $external_id:String
){
  items: users(
    page: 1,
    per_page: 1,
    filter: {
      deleted_at: { exists:false }
      external_id: { value: $external_id }
    }
    sort:{
      updated_at:{order:DESC}
    }
  ){
    total_entries
    results{
      id
      email
      first_name
      last_name
    }
  }
} 