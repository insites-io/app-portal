mutation create_feedback(
  $full_name: String,
  $location: String,
  $message: String,
  $allow_display_on_website: String,
) {
  items: record_create(
    record: {
      table: "modules/website/feedback",
      properties: [
        { 
          name: "full_name",
          value: $full_name 
        },
        { 
          name: "location",
          value: $location 
        },
        { 
          name: "message",
          value: $message 
        },
        { 
          name: "allow_display_on_website",
          value: $allow_display_on_website 
        }
      ]
    }
  ) {
    id
  }
}