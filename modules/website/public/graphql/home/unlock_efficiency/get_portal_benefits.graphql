query get_portal_benefits(
    $page: Int = 1, 
    $size: Int = 10,
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/website/portal_benefits" }
            deleted_at: { exists: false }
            properties: [
                { name: "enabled", value_boolean: true }
            ]
        }
        sort: [
            { properties: { name: "order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
            deleted_at
            #Portal Benefits Content
            benefit_title: property(name: "benefit_title")
            benefit_description: property(name: "benefit_description")
            ## icon
            icon: property_upload(name: "icon") {
                url
                file_name
                extension
                versions
            }
        }
    }
}