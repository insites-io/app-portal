query get_testimonials(
    $page: Int = 1, 
    $size: Int = 10,
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/website/testimonials" }
            deleted_at: { exists: false }
            properties: [
                { name: "is_shown_on_webstie", value_boolean: true }
            ]
        }
        sort: [
            { properties: { name: "order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
            deleted_at
            #Testimonial Content
            full_name: property(name: "full_name")
            location: property(name: "location")
            message: property(name: "message")
        }
    }
}