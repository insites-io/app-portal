query get_banner(
    $page: Int = 1, 
    $size: Int = 1,
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/portal/portal_banners" }
            deleted_at: { exists: false }
            properties: { name: "is_enabled", not_value_boolean: false } 
        }
        sort: {
            created_at: { order: DESC }
        }
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
            main_text: property(name: "main_text")
            sub_text: property(name: "sub_text")
            button_link: property(name: "button_link")
            button_label: property(name: "button_label")  
            ## Images
            image: property_upload(name: "image") {
                url
                file_name
                extension
                versions
            }
        }
    }
}