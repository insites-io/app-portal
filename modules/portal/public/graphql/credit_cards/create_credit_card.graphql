mutation create_credit_card (
  $uuid: String
  $currency: String
  $bank_name: String
  $card_brand: String
  $company_uuid: String
  $contact_uuid: String
  $bank_account_bsb: String
  $card_expiry_year: String
  $bank_account_name: String
  $card_expiry_month: String
  $payment_method_name: String
  $payment_method_token: String 
  $card_last_four_digits: String
  $bank_account_last_four_digits: String
) {
  items: record_create(
    record: {
      table: "modules/insites_ecommerce/payment_method"
      properties: [
        { name: "uuid", value: $uuid }
        { name: "currency", value: $currency }
        { name: "bank_name", value: $bank_name }
        { name: "card_brand", value: $card_brand }
        { name: "company_uuid", value: $company_uuid }
        { name: "contact_uuid", value: $contact_uuid }
        { name: "bank_account_bsb", value: $bank_account_bsb }
        { name: "card_expiry_year", value: $card_expiry_year }
        { name: "bank_account_name", value: $bank_account_name }
        { name: "card_expiry_month", value: $card_expiry_month }
        { name: "payment_method_name", value: $payment_method_name }
        { name: "payment_method_token", value: $payment_method_token } 
        { name: "card_last_four_digits", value: $card_last_four_digits }
        { name: "bank_account_last_four_digits", value: $bank_account_last_four_digits }
      ]
    }
  ) {
    id
    created_at
    properties
  }
}

