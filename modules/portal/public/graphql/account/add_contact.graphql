mutation add_contact(
  $uuid: ID!
  $first_name: String
  $last_name: String
  $email: String!
)
{
  items: user_create(
    user: {
      external_id: $uuid
      first_name: $first_name
      last_name: $last_name
      email: $email
    }
  ) {
    id
    email
    first_name
    last_name
    name
  }
}
