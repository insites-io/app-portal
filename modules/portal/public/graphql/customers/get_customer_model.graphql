query get_customer_model (
    $id: ID,
    $page: Int = 1,
    $size: Int = 1,
    $payment_method_token: String,
    $gateway_name: String,
    $user_id: String
    $email: String,
  ) {
    items: records(
      page: $page
      per_page: $size
      filter: {
        id: { value: $id }
        deleted_at: { exists: false }
        table: { value: "modules/insites_ecommerce/insites_customer" }
        properties: [
          { name: "payment_method_token", value: $payment_method_token }
          { name: "gateway_name", value: $gateway_name }
          { name: "user_id", value: $user_id }
          { name: "email", value: $email }
        ] 
      }
      sort: { updated_at: { order: DESC } }
    ) {
      total_entries
      total_pages
      current_page
      results {
        id 
        payment_method_token: property(name: "payment_method_token") 
        gateway_name: property(name: "gateway_name")
      }
    }
  }