query get_request(
    $page: Int = 1, 
    $size: Int = 10,
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/portal/request" }
        }
        sort: [
            { properties: { name: "sort_order", order: ASC } }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            created_at
            description: property(name: "description")
            requested_by: property(name: "requested_by")
            type: property(name: "type")
        }
    }
}