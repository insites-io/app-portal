query get_contact_us_data (
    $id: ID,
    $page: Int = 1,
    $size: Int = 1,
  ) {
    items: records(
      page: $page
      per_page: $size
      filter: {
        id: { value: $id }
        deleted_at: { exists: false }
        table: { value: "modules/website/contact_us" }
      }
      sort: { updated_at: { order: DESC } }
    ) {
      total_entries
      total_pages
      current_page
      results {
        id 
        document: property_upload(name:"document") {
          url
        }
      }
    }
  }