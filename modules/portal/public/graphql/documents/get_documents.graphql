query get_documents(
    $page: Int = 1, 
    $size: Int = 12,
  	$user_id: String, 
    $description: String
) {
    items: records(
      page: $page
      per_page: $size
      filter: {
        table: { value: "modules/portal/documents" }
        deleted_at: { exists: false }
        properties: [
          {name: "user_id", value: $user_id}
          {name: "description", contains: $description}
        ]
      }
      sort: [
          { updated_at: {order: DESC} }
      ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        has_next_page
        results {
          id
          updated_at
          created_at
          user_id: property(name: "user_id")
          description: property(name: "description")
          notes: property(name: "notes")
          file: property_upload(name: "file") {
            extension
            file_name
            url
            versions
          }
        }
    }
}