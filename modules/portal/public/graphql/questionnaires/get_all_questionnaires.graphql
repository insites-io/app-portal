query get_all_questionnaires(
    $page: Int = 1
    $size: Int = 100
    $user_id: String
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/portal/questionnaires" }
            deleted_at: { exists: false }
            properties: [
                { name: "user_id", value: $user_id }
            ]    
        }
        sort: [
            { 
              properties: { name: "year", order: DESC }
              created_at: {order: DESC}
            }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
          	user_id: property(name: "user_id")
          	year: property(name: "year")          	
        }
    }
}