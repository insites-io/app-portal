mutation generate_pdf ($questionnaire_id: ID!, $body: String!) {
  record_update(
    id: $questionnaire_id
    record: {
      properties: [ {
        name: "pdf"
        value_upload: {
          type: pdf
          content: $body
        },
       
      }
        ]
    }
  ) {
    id
    pdf: property_upload(name:"pdf") {
      extension
      file_name
      url
      versions
    }
  }
}