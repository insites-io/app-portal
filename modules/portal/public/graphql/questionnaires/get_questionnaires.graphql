query get_questionnaires(
    $page: Int = 1
    $size: Int = 1
  	$id: ID
    $user_id: String
  	$year: String
) {
    items: records(
        page: $page
        per_page: $size
        filter: {
            table: { value: "modules/portal/questionnaires" }
            deleted_at: { exists: false }
          	id: {value: $id}
            properties: [
                { name: "user_id", value: $user_id }
                { name: "year", value: $year }
            ]    
        }
        sort: [
            { 
              properties: { name: "year", order: DESC }
            }
        ]
    ) {
        total_entries
        total_pages
        per_page
        current_page
        results {
            id
            updated_at
            created_at
          	user_id: property(name: "user_id")
          	year: property(name: "year")
            have_you_heard: property(name: "have_you_heard")
           	howd_you_learn: property(name: "howd_you_learn")
           	reason_for_visit: property(name: "reason_for_visit")
          	personal_email: property(name: "personal_email")
           	primary_phone: property(name: "primary_phone")
           	previous_job: property(name: "previous_job")
            service_of_interest: property_array(name: "service_of_interest")
            #do not place 'attach_documents' and 'pdf' on the last
           	attach_documents: property_upload(name: "attach_documents") {
           	  extension
           	  file_name
           	  url
           	  versions
           	}
            pdf: property_upload(name:"pdf", expires_in: 1800) {
              extension
              file_name
              url
              versions
            }
           	contact_name: property(name: "contact_name")
          	contact_number: property(name: "contact_number")
           	update_site: property(name: "update_site")
           	notes: property(name: "notes")
          	agreement: property_array(name: "agreement")            
        }
    }
}