mutation set_password_token_to_invited_users(
  $id: ID!
  $token: String!
) {
  user_update(
    id: $id
    user: {
      profiles: [
        {
          name: "modules/insites_core/token",
          values: {
            properties: [
              { name: "password_token", value: $token }
            ]
          }
        }
      ]
    }
    form_name: "modules/portal/set_password_token_to_invited_users"
  ) {
    id
  }
}