name: portal
metadata:
  label: "portal"
properties:
- name: invitation_status
  type: string
  metadata:
    type: "string"
    label: "Invitation Status"
    weight: 1
    options: ["Accepted","Invited"]
    ui_element: "select"
- name: is_enabled
  type: boolean
  metadata:
    type: "toggle"
    label: "Is Enabled"
    weight: 1
    options: []
- name: permission_level
  type: string
  metadata:
    type: "string"
    label: "Permission Level"
    weight: 1
    options: ["Account Owner","Staff","Manager","No Access"]
    ui_element: "select"
- name: primary_account_holder
  type: boolean
  metadata:
    type: "toggle"
    label: "Primary account holder"
    weight: 1
    options: []
- name: verification_token
  type: string
